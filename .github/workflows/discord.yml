name: Discord Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate changelog
        id: log
        run: |
          SUMMARY=$(git log -1 --pretty=format:"%s")

          if [ -z "$SUMMARY" ]; then
            SUMMARY="Minor internal update"
          fi

          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null \
            | grep -vE '^\.github|^\.vscode' \
            | cut -d/ -f1 \
            | sort | uniq)

          if [ -z "$FILES" ]; then
            FILE_LIST="• internal"
          else
            FILE_LIST=$(echo "$FILES" | sed 's/^/• /')
          fi

          OUTPUT=$(printf "• %s\n\n📂 Areas affected:\n%s" "$SUMMARY" "$FILE_LIST")

          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send to Discord
        env:
          NAME: ${{ github.event.release.name }}
          TAG: ${{ github.event.release.tag_name }}
          URL: ${{ github.event.release.html_url }}
          BODY: ${{ steps.log.outputs.text }}
        run: |
          echo "Sending message..."

          PAYLOAD=$(jq -n \
            --arg name "$NAME" \
            --arg tag "$TAG" \
            --arg url "$URL" \
            --arg body "$BODY" \
            '{
              content:
              "🚀 " + $name + "\n📦 Version: " + $tag + "\n\n" +
              (if $body == "" then "🛠 Minor internal update" else $body end) +
              "\n\n🔗 " + $url
            }')

          echo "$PAYLOAD"

          curl -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "${{ secrets.DISCORD_WEBHOOK }}"
