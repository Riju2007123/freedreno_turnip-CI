name: Discord Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send to Discord
  run: |
    echo "Sending Discord message..."

    PAYLOAD=$(jq -n \
      --arg name "${{ github.event.release.name }}" \
      --arg tag "${{ github.event.release.tag_name }}" \
      --arg url "${{ github.event.release.html_url }}" \
      --arg body "${{ steps.log.outputs.text }}" \
      '{
        content:
        "🚀 " + $name + "\n📦 Version: " + $tag + "\n\n" +
        (if $body == "" then "🛠 Minor internal update" else $body end) +
        "\n\n🔗 " + $url
      }')

    echo "Payload:"
    echo "$PAYLOAD"

    RESPONSE=$(curl -s -w "%{http_code}" -o response.txt \
      -H "Content-Type: application/json" \
      -d "$PAYLOAD" \
      "${{ secrets.DISCORD_WEBHOOK }}")

    echo "HTTP Response: $RESPONSE"
    echo "Response body:"
    cat response.txt
               
