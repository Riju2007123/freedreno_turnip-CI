name: Discord Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # only need recent commits

      - name: Generate clean changelog
        id: log
        run: |
          # Get latest commit message only (safe)
          SUMMARY=$(git log -1 --pretty=format:"%s")

          if [ -z "$SUMMARY" ]; then
            SUMMARY="Minor internal update"
          fi

          # Get changed folders from last commit (safe)
          FILES=$(git diff --name-only HEAD~1 HEAD \
            | grep -vE '^\.github|^\.vscode' \
            | cut -d/ -f1 \
            | sort | uniq)

          if [ -z "$FILES" ]; then
            FILE_LIST="• internal"
          else
            FILE_LIST=$(echo "$FILES" | sed 's/^/• /')
          fi

          OUTPUT="• $SUMMARY

📂 Areas affected:
$FILE_LIST"

          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send to Discord
        run: |
          jq -n \
            --arg name "${{ github.event.release.name }}" \
            --arg tag "${{ github.event.release.tag_name }}" \
            --arg url "${{ github.event.release.html_url }}" \
            --arg body "${{ steps.log.outputs.text }}" \
            '{
              content:
              "🚀 " + $name + "\n📦 Version: " + $tag + "\n\n" +
              $body +
              "\n\n🔗 " + $url
            }' \
          | curl -H "Content-Type: application/json" \
                 -d @- \
                 "${{ secrets.DISCORD_WEBHOOK }}"
