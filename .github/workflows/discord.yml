name: Discord Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get affected areas
        id: log
        run: |
          CURRENT="${{ github.event.release.tag_name }}"
          PREVIOUS=$(git tag --sort=-creatordate | grep -A1 "$CURRENT" | tail -n1)

          ALL_FILES=$(git diff --name-only "$PREVIOUS" "$CURRENT")

          FILES=$(echo "$ALL_FILES" \
            | grep -v '^\.github' \
            | cut -d/ -f1 \
            | sort -u \
            | head -n 6)

          if [ -z "$FILES" ]; then
            if echo "$ALL_FILES" | grep -q '^\.github'; then
              OUTPUT="⚙️ Workflow updated"
            else
              OUTPUT="🛠 Minor internal updates"
            fi
          else
            FILE_LIST=$(echo "$FILES" | sed 's/^/• /')
            OUTPUT=$(printf "📂 Areas affected:\n%s" "$FILE_LIST")
          fi

          {
            echo "text<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send to Discord
        run: |
          jq -n \
            --arg name "${{ github.event.release.name }}" \
            --arg tag "${{ github.event.release.tag_name }}" \
            --arg url "${{ github.event.release.html_url }}" \
            --arg body "${{ steps.log.outputs.text }}" \
            '{
              content:
              "🚀 **\($name)**\n📦 Version: \($tag)\n\n\($body)\n\n🔗 \($url)"
            }' \
          | curl -s -H "Content-Type: application/json" \
                 -d @- \
                 "${{ secrets.DISCORD_WEBHOOK }}"
